# ── Port (Railway injecte PORT automatiquement) ────────────────────────────
quarkus.http.port=${PORT:8080}

# ── PostgreSQL (Railway injecte DATABASE_URL) ───────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/assistantbcp}
quarkus.datasource.username=${PGUSER:postgres}
quarkus.datasource.password=${PGPASSWORD:postgres}
quarkus.hibernate-orm.database.generation=update

# ── Ollama ──────────────────────────────────────────────────────────────────
# ⚠️  Sur Railway, Ollama tourne pas → utilise OLLAMA_URL pour pointer vers
#     ton PC local via ngrok (voir étape 5)
ollama.base-url=${OLLAMA_URL:http://localhost:11434}
ollama.model=${OLLAMA_MODEL:llama3.2:3b}
ollama.timeout=120

# ── ChromaDB ────────────────────────────────────────────────────────────────
chroma.base-url=${CHROMA_URL:http://localhost:8100}

# ── Admin ───────────────────────────────────────────────────────────────────
bcp.admin.key=${ADMIN_KEY:Zidane2026}

# ── CORS (autoriser le frontend Railway) ───────────────────────────────────
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization,X-Admin-Key
