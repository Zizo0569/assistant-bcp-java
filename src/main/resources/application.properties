# Port Quarkus (séparé de Python 8000)
quarkus.http.port=8081

# CORS — autorise le front HTML à appeler ce backend
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,OPTIONS
quarkus.http.cors.headers=Content-Type,X-Admin-Key,ngrok-skip-browser-warning

# Ollama LLM
ollama.base-url=http://localhost:11434
ollama.model=llama3.2:3b
ollama.timeout=60

# Admin
bcp.admin.key=Zidane2026

# Logs
quarkus.log.level=INFO

# ═══════════════════════════════════════
# BASE DE DONNÉES — PostgreSQL
# ═══════════════════════════════════════
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=bcp_pass
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/bcp_db

# Crée/met à jour les tables automatiquement au démarrage
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# ═══════════════════════════════════════
# BASE DE DONNÉES — Mode DEV (H2 en mémoire si PostgreSQL absent)
# ═══════════════════════════════════════
%dev.quarkus.datasource.db-kind=postgresql
%dev.quarkus.datasource.username=postgres
%dev.quarkus.datasource.password=bcp_pass
%dev.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/bcp_db
%dev.quarkus.hibernate-orm.database.generation=update

# ══════════════════════════════════════════════════════════════
# AJOUTER dans application.properties (Quarkus)
# ══════════════════════════════════════════════════════════════

# URL FastAPI Python (pour les embeddings)
python.base-url=http://localhost:8000

# URL ChromaDB serveur
chroma.base-url=http://localhost:8100
chroma.tenant=default_tenant
chroma.database=default_database
